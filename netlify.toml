[build]
  command = "npm install --no-audit && cd frontend && npm install --no-audit && npm run build"
  publish = "frontend/build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/health-check"
  to = "/.netlify/functions/api/api/health-check"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
